name: Release (Patch)

on:
  workflow_dispatch:

jobs:
  patch-release:
    runs-on: ubuntu-latest
    # Safety: Only allow running if the branch name starts with patch/
    if: startsWith(github.ref, 'refs/heads/patch/')
    permissions:
      contents: write
      pull-requests: write # Required to create the backport PR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate Next Patch Version
        id: semver
        run: |
          # Find the latest tag reachable from this branch
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r major minor patch <<< "$VERSION"
          
          # Increment only the patch segment
          patch=$((patch + 1))
          
          NEW_TAG="v$major.$minor.$patch"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "Preparing Patch Release: $NEW_TAG"

      - name: Set up Amazon Corretto 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: gradle

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assemble -PprojVersion=${NEW_TAG#v}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Python Package
        working-directory: zmq-pub-sub-python-client
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: Patch Release ${{ env.NEW_TAG }}
          body: |
            ## Patch Notes
            Automated patch release from branch `${{ github.ref_name }}`.
            
            **Don't forget to merge the automated PR back to main!**
          draft: false
          prerelease: false
          files: |
            build/libs/*.jar
            */build/libs/*.jar
            zmq-pub-sub-python-client/dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Backport Pull Request to Main
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch-suffix: short-commit-hash
          title: "Backport: ${{ env.NEW_TAG }} fixes to main"
          body: |
            This is an automated PR created after the release of `${{ env.NEW_TAG }}`.
            Please review and merge these changes into `main` to prevent regression.
          labels: |
            backport
            automated-pr