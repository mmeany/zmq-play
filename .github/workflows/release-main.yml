name: Release (Major/Minor)

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Select release type'
        required: true
        default: 'minor'
        type: choice
        options:
          - major
          - minor

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Safety check: Only runs on main
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate Next Version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r major minor patch <<< "$VERSION"
          
          if [ "${{ github.event.inputs.version_type }}" == "major" ]; then
            major=$((major + 1))
            minor=0
          else
            minor=$((minor + 1))
          fi
          # Reset patch to 0 for any main-line release
          patch=0
          
          echo "NEW_TAG=v$major.$minor.$patch" >> $GITHUB_ENV

      - name: Set up Amazon Corretto 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: gradle

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assemble -PprojVersion=${NEW_TAG#v}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build Python Package
        working-directory: zmq-pub-sub-python-client
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: Release ${{ env.NEW_TAG }}
          files: |
            build/libs/*.jar
            */build/libs/*.jar
            zmq-pub-sub-python-client/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}